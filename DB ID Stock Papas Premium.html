  ['PALLET_ORDER','PRODUCT'],['PALLET_ORDER','PALLET_ORDER_TYPE'],['PALLET_ORDER','BOXES'],['PALLET_ORDER','PALLET_CAPACITY'],
  ['PALLET_ORDER_DETAIL','PALLET_ORDER'],['PALLET_ORDER_DETAIL','FIELD_LOG'],['PALLET_ORDER_DETAIL','FIELD_LOG_DETAIL'],
  ['PALLET_ORDER_DETAIL','SIZES'],['PALLET_ORDER_DETAIL','VARIETIES'],['PALLET_ORDER_DETAIL','PACKING'],
  ['REJECTION_TYPES','REJECTION_REASONS'],['REJECTION_TYPES_DETAIL','REJECTION_TYPES'],
  ['REWORKS','FIELD_LOG'],['REWORKS','FIELD_LOG_DETAIL'],['REWORKS','PRODUCT'],['REWORKS','STAFF'],
  ['LIQUIDACION_MANUAL','FIELD_LOG'],['LIQUIDACION_MANUAL','LIQUIDACION_COLOR'],
  ['MOVEMENT_LOG','MOVEMENT_CATEGORY'],
  ['PALLET_MOVEMENTS','PALLET'],['PALLET_MOVEMENTS','LOCATION'],['PALLET_MOVEMENTS','STAFF'],
  ['PALLETS','LOCATION'],['PALLETS','STATE'],
  ['POST_SALE_CONTROL','ORDER'],['POST_SALE_CONTROL','FINAL_SALE'],['POST_SALE_CONTROL','REJECTION_REASONS'],['POST_SALE_CONTROL','STAFF'],
  ['RACKS','COLD_ROOMS'],
  ['VEHICLE_TRACKING','GATE_REGISTRATION'],['VEHICLE_TRACKING','STAFF'],
  ['WASTE','FIELD_LOG'],['WASTE','FIELD_LOG_DETAIL'],['WASTE','PRODUCT'],['WASTE','STAFF'],
];

const tmap=Object.fromEntries(T.map(t=>[t[0],t]));
const stage=document.getElementById('stage');
const svgl=document.getElementById('svgl');
const vp=document.getElementById('vp');
let sc=0.45,px=0,py=0,dragging=false,ds=null,ps=null,sel=null,showU=false,showC=false;
const activeM=new Set(Object.keys(M));
const lineMap={};

// Legend
const leg=document.getElementById('legend');
Object.entries(M).forEach(([k,{l,c}])=>{
  const el=document.createElement('div');
  el.className='li on'; el.dataset.mod=k;
  el.innerHTML=`<span class="dot" style="background:${c}"></span><span>${l}</span>`;
  el.onclick=()=>toggleMod(k,el);
  leg.appendChild(el);
});

// Build cards
T.forEach(([id,mod,x,y,cols])=>{
  const {c}=M[mod];
  const card=document.createElement('div');
  card.className='tc'+(mod==='unused'?' unused':'');
  card.id='c-'+id; card.dataset.t=id; card.dataset.m=mod;
  card.style.cssText=`left:${x}px;top:${y}px`;
  const h=document.createElement('div');
  h.className='ch';
  h.style.cssText=`background:${c}18;border-bottom:2px solid ${c}50`;
  h.innerHTML=`<span class="tn" style="color:${c}">${id}</span>`;
  const cc=document.createElement('div'); cc.className='cc';
  cols.forEach(([n,tp])=>{
    const r=document.createElement('div');
    r.className='cr'+(tp==='pk'?' pk':tp==='fk'?' fk':'');
    r.innerHTML=`<span class="ci">${tp==='pk'?'🔑':tp==='fk'?'⤷':'·'}</span><span class="cn">${n}</span>`;
    cc.appendChild(r);
  });
  card.appendChild(h); card.appendChild(cc);
  card.onclick=e=>{e.stopPropagation();selectT(id);};
  stage.appendChild(card);
});

// Build SVG lines
R.forEach(([f,t])=>{
  const mod=tmap[f]?.[1]; const c=M[mod]?.c||'#5b6af7';
  const path=document.createElementNS('http://www.w3.org/2000/svg','path');
  path.classList.add('ln'); path.setAttribute('stroke',c);
  path.id=`ln-${f}-${t}`; svgl.appendChild(path);
  if(!lineMap[f])lineMap[f]=[];
  if(!lineMap[t])lineMap[t]=[];
  lineMap[f].push({el:path,other:t});
  lineMap[t].push({el:path,other:f});
});

function cardBounds(id){
  const el=document.getElementById('c-'+id); if(!el) return null;
  const x=parseInt(el.style.left),y=parseInt(el.style.top),w=el.offsetWidth||185,h=el.offsetHeight||200;
  return{x,y,w,h,cx:x+w/2,cy:y+h/2,l:x,r:x+w,t:y,b:y+h};
}

function updLines(){
  R.forEach(([f,t])=>{
    const p=document.getElementById(`ln-${f}-${t}`); if(!p) return;
    const a=cardBounds(f),b=cardBounds(t); if(!a||!b) return;
    let x1,y1,x2,y2;
    if(a.cx<b.cx){x1=a.r;y1=a.cy;x2=b.l;y2=b.cy;}
    else if(a.cx>b.cx){x1=a.l;y1=a.cy;x2=b.r;y2=b.cy;}
    else{x1=a.cx;y1=a.b;x2=b.cx;y2=b.t;}
    const dx=Math.abs(x2-x1)*0.45;
    p.setAttribute('d',`M${x1},${y1} C${x1+dx*(a.cx<b.cx?1:-1)},${y1} ${x2+dx*(a.cx<b.cx?-1:1)},${y2} ${x2},${y2}`);
  });
}

function applyT(){
  stage.style.transform=`translate(${px}px,${py}px) scale(${sc})`;
  updLines(); drawMM();
}

function selectT(id){
  if(sel===id){sel=null;clearHi();if(showC)showAll();return;}
  sel=id; hiTable(id);
}

function hiTable(id){
  document.querySelectorAll('.tc').forEach(c=>{c.classList.remove('hi','rel','dim');c.classList.add('dim');});
  svgl.querySelectorAll('.ln').forEach(l=>l.classList.remove('vis','hi'));
  const rel=new Set([id]);
  R.forEach(([f,t])=>{
    if(f===id||t===id){
      rel.add(f);rel.add(t);
      const el=document.getElementById(`ln-${f}-${t}`);
      if(el){el.classList.add('hi');el.classList.remove('vis');}
    }
  });
  rel.forEach(rid=>{
    const c=document.getElementById('c-'+rid);
    if(c){c.classList.remove('dim');c.classList.add(rid===id?'hi':'rel');}
  });
}

function clearHi(){
  document.querySelectorAll('.tc').forEach(c=>c.classList.remove('hi','rel','dim'));
  svgl.querySelectorAll('.ln').forEach(l=>l.classList.remove('vis','hi'));
}

function showAll(){svgl.querySelectorAll('.ln').forEach(l=>{if(l.style.display!=='none')l.classList.add('vis');});}

// Pan/Zoom
let didDrag=false;
vp.addEventListener('mousedown',e=>{
  if(e.target===vp||e.target===stage||e.target.tagName==='svg'||e.target.tagName==='path'){
    dragging=true; didDrag=false;
    ds={x:e.clientX,y:e.clientY}; ps={x:px,y:py};
    vp.classList.add('drag');
  }
});
window.addEventListener('mousemove',e=>{
  if(!dragging)return;
  const moved=Math.abs(e.clientX-ds.x)>4||Math.abs(e.clientY-ds.y)>4;
  if(moved) didDrag=true;
  px=ps.x+(e.clientX-ds.x); py=ps.y+(e.clientY-ds.y); applyT();
});
window.addEventListener('mouseup',()=>{dragging=false;vp.classList.remove('drag');});
vp.addEventListener('wheel',e=>{
  e.preventDefault();
  const f=e.deltaY<0?1.1:0.91;
  const r=vp.getBoundingClientRect();
  const mx=e.clientX-r.left,my=e.clientY-r.top;
  px=mx-(mx-px)*f; py=my-(my-py)*f;
  sc=Math.max(.12,Math.min(2,sc*f)); applyT();
},{passive:false});

function doZoom(f){
  const cx=vp.clientWidth/2,cy=vp.clientHeight/2;
  px=cx-(cx-px)*f; py=cy-(cy-py)*f;
  sc=Math.max(.12,Math.min(2,sc*f)); applyT();
}

function resetView(){sc=0.42;px=10;py=10;applyT();}

// Search
document.getElementById('search').addEventListener('input',e=>{
  const q=e.target.value.toLowerCase();
  document.querySelectorAll('.tc').forEach(c=>{
    const name=c.dataset.t.toLowerCase();
    c.style.outline=!q?'':name.includes(q)?'2px solid #5b6af7':'';
    c.style.zIndex=!q?'':name.includes(q)?'30':'';
  });
});

// Toggle unused
function toggleUnused(){
  showU=!showU;
  document.getElementById('btn-unused').classList.toggle('on',showU);
  document.querySelectorAll('.tc.unused').forEach(c=>c.style.display=showU?'':'none');
  document.querySelectorAll('.ln').forEach(l=>{
    const parts=l.id.split('-');
    const f=parts.slice(1,-1).join('-'),t=parts[parts.length-1];
    const fn=l.id.replace('ln-','');
    // simpler approach: check if either table is unused
    const tables=fn.split('-');
    // actually let's just check if any endpoint is an unused table
    const fromId=l.id.replace(/^ln-/,'').replace(/-[^-]+$/,'');
    const toId=l.id.replace(/^ln-[^-]+-/,'').replace(/-.*$/,'');
  });
  // Redraw connection visibility
  R.forEach(([f,t])=>{
    const el=document.getElementById(`ln-${f}-${t}`); if(!el) return;
    const fm=tmap[f]?.[1],tm=tmap[t]?.[1];
    const isUnused=fm==='unused'||tm==='unused';
    if(!showU&&isUnused){el.style.display='none';el.classList.remove('vis','hi');}
    else{el.style.display='';}
  });
  if(showC&&sel===null)showAll();
}

// Toggle connections
function toggleConn(){
  showC=!showC;
  document.getElementById('btn-conn').classList.toggle('on',showC);
  if(showC&&sel===null)showAll();
  else if(!showC){clearHi();if(sel)hiTable(sel);}
}

// Module filter
function toggleMod(k,el){
  if(activeM.has(k)){if(activeM.size===1)return;activeM.delete(k);el.classList.remove('on');el.style.opacity='.35';}
  else{activeM.add(k);el.classList.add('on');el.style.opacity='';}
  document.querySelectorAll('.tc').forEach(c=>{c.style.visibility=activeM.has(c.dataset.m)?'':'hidden';});
}

// click bg = deselect (solo si no hubo arrastre)
vp.addEventListener('click',e=>{
  if(didDrag){didDrag=false;return;}
  if(e.target===vp||e.target===stage||e.target.tagName==='svg'){
    sel=null;clearHi();if(showC)showAll();
  }
});

// Minimap
const mmc=document.getElementById('mmc');
const ctx=mmc.getContext('2d');
mmc.width=190*2; mmc.height=120*2;
function drawMM(){
  const W=3000,H=2100,mw=380,mh=240,s=mw/W;
  ctx.clearRect(0,0,mw,mh);
  ctx.fillStyle='#090a16'; ctx.fillRect(0,0,mw,mh);
  // Draw table dots
  T.forEach(([id,mod,x,y,cols])=>{
    const {c}=M[mod];
    ctx.fillStyle=c+'99';
    ctx.fillRect(x*s,y*s,185*s,20*s);
  });
  // Draw viewport rect
  const r=vp.getBoundingClientRect();
  const vx=-px/sc,vy=-py/sc,vw=r.width/sc,vh=r.height/sc;
  ctx.strokeStyle='rgba(255,255,255,.4)';ctx.lineWidth=1;
  ctx.strokeRect(vx*s,vy*s,vw*s,vh*s);
}

// Init
setTimeout(()=>{
  updLines();
  document.querySelectorAll('.tc.unused').forEach(c=>c.style.display='none');
  resetView();
  drawMM();
},150);
</script>
</body>
